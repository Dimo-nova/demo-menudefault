<title>Menu Demo</title>

<!-- ── Fonts (loaded dynamically from CONFIG) ─────────────────────── -->
<script>
(function() {
  var h = CONFIG.headingFont.replace(/ /g, '+');
  var b = CONFIG.bodyFont.replace(/ /g, '+');
  var link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + h + ':wght@500;600;700;800&family=' + b + ':wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap';
  document.head.appendChild(link);
  document.title = CONFIG.name + ' — Menu';
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #fff;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root {
    height: 100vh;        /* fallback for older browsers */
    height: 100dvh;       /* tracks the visible viewport (no dead scroll under the address bar) */
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #E4DFD5;   /* neutral backdrop shown beside the menu on wide screens */
  }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>

// Resolve a per-language field ({EN,ES,FR,DE}) to the current language, falling back to EN.
// Plain strings pass through unchanged.
function dishText(field, t) {
  if (field && typeof field === 'object') return field[t.code] || field.EN || '';
  return field || '';
}

// Currency placement: some symbols sit after the amount ("12 €"), most before ("$12").
const CURRENCY_AFTER = ['€', 'kr', 'zł', 'Kč', 'Ft', 'lei', 'p.', 'руб', '₽'];
function fmtPrice(price, cur = CONFIG.currency) {
  return CURRENCY_AFTER.includes(cur) ? `${price} ${cur}` : `${cur}${price}`;
}

function DishPhoto({ image, radius=14, style }) {
  const base = { borderRadius:radius, overflow:'hidden', background:'var(--surface-2)', flexShrink:0, ...style };
  if (image) return <div style={base}><img src={image} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} /></div>;
  return (
    <div style={{ ...base, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--muted)' }}>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ opacity:.5 }}>
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
      </svg>
    </div>
  );
}

// Shared coordinator so only one allergen tooltip is visible at a time.
let _allergenTipSeq = 0;
const allergenTip = { listeners:new Set(), open(id){ this.listeners.forEach(fn => fn(id)); } };

function AllergenIcon({ code, name, size=24 }) {
  const [show, setShow] = useState(false);
  const [dx, setDx] = useState(0);
  const tipRef = useRef(null);
  const idRef = useRef(0);
  if (!idRef.current) idRef.current = ++_allergenTipSeq;
  const file = ALLERGEN_ICONS[code];
  useEffect(() => {
    const fn = (openId) => { if (openId !== idRef.current) setShow(false); };
    allergenTip.listeners.add(fn);
    return () => allergenTip.listeners.delete(fn);
  }, []);
  useEffect(() => { if (!show) { setDx(0); return; } const id = setTimeout(() => setShow(false), 2000); return () => clearTimeout(id); }, [show]);
  // Keep the tooltip inside the menu column — nudge it horizontally if it would spill past an edge.
  useLayoutEffect(() => {
    if (!show || !tipRef.current) return;
    const col = document.getElementById('appcol');
    const bounds = col ? col.getBoundingClientRect() : { left:0, right:window.innerWidth };
    const r = tipRef.current.getBoundingClientRect();
    const pad = 8;
    let d = 0;
    if (r.left < bounds.left + pad) d = (bounds.left + pad) - r.left;
    else if (r.right > bounds.right - pad) d = (bounds.right - pad) - r.right;
    if (d) setDx(d);
  }, [show]);
  const onClick = (e) => {
    e.stopPropagation();
    if (show) { setShow(false); }
    else { allergenTip.open(idRef.current); setShow(true); }
  };
  return (
    <span style={{ position:'relative', display:'inline-flex', flexShrink:0 }}>
      <img
        src={`images/allergens/${file}`} alt={name} title={name}
        onClick={onClick}
        style={{ width:size, height:size, flexShrink:0, cursor:'pointer', display:'block', objectFit:'contain' }}
      />
      {show && (
        <span ref={tipRef} style={{ position:'absolute', bottom:'calc(100% + 6px)', left:'50%', transform:`translateX(calc(-50% + ${dx}px))`, background:'var(--text)', color:'var(--bg)', fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, padding:'4px 8px', borderRadius:6, whiteSpace:'nowrap', zIndex:50, boxShadow:'0 4px 12px rgba(0,0,0,0.25)', pointerEvents:'none' }}>{name}</span>
      )}
    </span>
  );
}

            <div style={{ fontFamily:'var(--font-body)', fontWeight:m?500:700, fontSize:15, color:m?'var(--accent)':'var(--text)', whiteSpace:'nowrap' }}>{fmtPrice(dish.price)}</div>
          </div>
          <div style={{ fontFamily:'var(--font-body)', fontSize:12.5, lineHeight:1.4, color:'var(--muted)', marginTop:4, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{dishText(dish.desc, t)}</div>
          <AllergenChips codes={dish.allergens} t={t} />
        </div>
      </div>
    </div>
  );
}

let _openDish = () => {};
function DishCardBound({ theme, dish, t }) { return <DishCard theme={theme} dish={dish} t={t} onOpen={d => _openDish(d)} />; }

function dishPasses(d, filters) {
  for (const tag of filters.diet) {
    if (tag === 'v' && !(d.tags.includes('v') || d.tags.includes('vg'))) return false;
    if (tag === 'vg' && !d.tags.includes('vg')) return false;
  }
  for (const code of filters.free) if (d.allergens.includes(code)) return false;
  return true;
}

function matchesQuery(d, query, t) {
  const s = (query || '').trim().toLowerCase();
  if (!s) return true;
  return dishText(d.name, t).toLowerCase().includes(s) || dishText(d.desc, t).toLowerCase().includes(s);
}

function MenuList({ theme, active, filters, query, t }) {
  const m = theme.minimal;
  const pass = d => dishPasses(d, filters) && matchesQuery(d, query, t);
  const groups = (active === 'All' ? CATEGORIES.map(c => ({ cat:c, items:DISHES.filter(d => d.cat===c && pass(d)) }))
                                    : [{ cat:active, items:DISHES.filter(d => d.cat===active && pass(d)) }])
                 .filter(g => g.items.length > 0);
  if (groups.length === 0) {
    return (
      <div style={{ padding:'48px 24px', textAlign:'center', fontFamily:'var(--font-body)', fontSize:14, color:'var(--muted)' }}>{t.noMatch}</div>
    );
  }
  return (
    <div style={{ padding:m?'4px 20px 0':'14px 16px 0' }}>
      {groups.map((g, gi) => (
        <div key={g.cat} style={{ marginTop:gi===0?0:(m?22:18) }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:m?4:10, paddingTop:m?8:0 }}>
            <span style={{ fontFamily:m?'var(--font-body)':'var(--font-display)', fontWeight:m?500:700, fontSize:m?11.5:14, letterSpacing:m?'0.2em':'0.01em', textTransform:m?'uppercase':'none', color:m?'var(--muted)':'var(--text)' }}>{t.catLabels[g.cat] || g.cat}</span>
            {m && <span style={{ flex:1, height:1, background:'var(--line)' }}></span>}
          </div>
          {g.items.map(d => <DishCardBound key={d.id} theme={theme} dish={d} t={t} />)}
        </div>
      ))}
    </div>
  );
}

function Legend({ theme, t }) {
  const m = theme.minimal;
  return (
    <div style={{ padding:m?'26px 20px 0':'20px 16px 0' }}>
      <div style={{ background:'var(--surface-2)', border:m?'1px solid var(--line)':'none', borderRadius:'var(--card-radius)', padding:m?'18px':'18px 16px' }}>
        <div style={{ fontFamily:m?'var(--font-body)':'var(--font-display)', fontWeight:m?500:700, fontSize:m?11.5:14, letterSpacing:m?'0.2em':'0.01em', textTransform:m?'uppercase':'none', color:'var(--text)', marginBottom:12 }}>{t.allergenGuide}</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', columnGap:14, rowGap:8 }}>
          {Object.entries(t.allergens).map(([code, name]) => (
            <div key={code} style={{ display:'flex', alignItems:'center', gap:9 }}>
              <AllergenIcon code={code} name={name} size={20} />
              <span style={{ fontFamily:'var(--font-body)', fontSize:11.5, color:'var(--muted)', lineHeight:1.2 }}>{name}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop:14, paddingTop:12, borderTop:'1px solid var(--line)', fontFamily:'var(--font-body)', fontSize:11, lineHeight:1.45, color:'var(--muted)' }}>{t.disclaimer}</div>
      </div>
    </div>
  );
}

function PairCard({ dish, onOpen, t }) {
  if (!dish) return null;
  return (
    <div onClick={() => onOpen(dish)} style={{ flex:'0 0 auto', width:158, display:'flex', alignItems:'center', gap:10, background:'var(--surface)', borderRadius:'var(--card-radius)', boxShadow:'var(--shadow)', padding:8, cursor:'pointer' }}>
      <DishPhoto image={dish.image} radius={9} style={{ width:42, height:42 }} />
      <div style={{ minWidth:0 }}>
        <div style={{ fontFamily:'var(--font-body)', fontSize:12.5, fontWeight:600, color:'var(--text)', lineHeight:1.15, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{dishText(dish.name, t)}</div>
        <div style={{ fontFamily:'var(--font-body)', fontSize:11.5, color:'var(--accent)', marginTop:2 }}>{fmtPrice(dish.price)}</div>
      </div>
    </div>
  );
}

function DetailSheet({ theme, dish, onClose, onOpen, t }) {
  const [shown, setShown] = useState(false);
  useEffect(() => { const timer = setTimeout(() => setShown(true), 30); return () => clearTimeout(timer); }, []);
  const m = theme.minimal;
  const close = () => { setShown(false); setTimeout(onClose, 260); };
  const pairs = (dish.pairsWith || []).map(id => DISHES.find(d => d.id === id)).filter(Boolean);
  return (
    <div style={{ position:'absolute', inset:0, zIndex:80 }}>
      <div onClick={close} style={{ position:'absolute', inset:0, background:'rgba(18,12,8,0.42)', opacity:shown?1:0, transition:'opacity .26s ease', backdropFilter:'blur(1.5px)' }}></div>
      <div className="no-scrollbar" style={{ position:'absolute', left:0, right:0, bottom:0, background:'var(--bg)', borderTopLeftRadius:m?8:28, borderTopRightRadius:m?8:28, transform:shown?'translateY(0)':'translateY(101%)', transition:'transform .3s cubic-bezier(.32,.72,0,1)', maxHeight:'80%', overflowY:'auto', paddingBottom:28, boxShadow:'0 -10px 40px rgba(0,0,0,0.18)' }}>

        {/* Full-bleed photo banner with overlaid close */}
        <div style={{ position:'relative' }}>
          <DishPhoto image={dish.image} radius={0} style={{ width:'100%', height:200, borderTopLeftRadius:m?8:28, borderTopRightRadius:m?8:28 }} />
          <button onClick={close} aria-label={t.close} style={{ position:'absolute', top:12, right:12, width:32, height:32, borderRadius:'50%', border:'none', cursor:'pointer', background:'rgba(0,0,0,0.45)', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(4px)' }}>
            <svg width="15" height="15" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="#fff" strokeWidth="1.7" strokeLinecap="round"/></svg>
          </button>
        </div>

        <div style={{ padding:'16px 20px 0' }}>
          {dish.popular && <div style={{ marginBottom:7 }}><PopularBadge minimal={m} t={t} /></div>}
          <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
            <div style={{ flex:1, fontFamily:'var(--font-display)', fontWeight:m?600:700, fontSize:m?27:23, lineHeight:1.08, color:'var(--text)', letterSpacing:'var(--name-spacing)' }}>{dishText(dish.name, t)}</div>
            <div style={{ fontFamily:'var(--font-body)', fontWeight:m?500:700, fontSize:19, color:m?'var(--accent)':'var(--text)', whiteSpace:'nowrap', paddingTop:2 }}>{fmtPrice(dish.price)}</div>
          </div>
          <div style={{ fontFamily:'var(--font-body)', fontSize:14, lineHeight:1.5, color:'var(--muted)', marginTop:10 }}>{dishText(dish.desc, t)}</div>

          {/* Contains — inline allergen icons */}
          <div style={{ fontFamily:'var(--font-body)', fontSize:10.5, fontWeight:m?500:600, letterSpacing:'0.16em', textTransform:'uppercase', color:'var(--muted)', marginTop:22, marginBottom:10 }}>{t.contains}</div>
          {dish.allergens.length
            ? <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>{dish.allergens.map(c => <AllergenIcon key={c} code={c} name={t.allergens[c]} size={30} />)}</div>
            : <div style={{ fontFamily:'var(--font-body)', fontSize:14, color:'var(--muted)' }}>{t.noAllergens}</div>}

          {/* Pairs with — horizontal scroller */}
          {pairs.length > 0 && (
            <div>
              <div style={{ fontFamily:'var(--font-body)', fontSize:10.5, fontWeight:m?500:600, letterSpacing:'0.16em', textTransform:'uppercase', color:'var(--muted)', marginTop:22, marginBottom:10 }}>{t.pairsWith}</div>
              <div className="no-scrollbar" style={{ display:'flex', gap:10, overflowX:'auto', paddingBottom:2 }}>
                {pairs.map(p => <PairCard key={p.id} dish={p} onOpen={onOpen} t={t} />)}
              </div>
            </div>
          )}

          <div style={{ height:8 }}></div>
        </div>
      </div>
    </div>
  );
}

function ThemeToggle({ themeKey, onPick, t }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onEsc = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('pointerdown', onDoc, true);
    document.addEventListener('keydown', onEsc, true);
    return () => { document.removeEventListener('pointerdown', onDoc, true); document.removeEventListener('keydown', onEsc, true); };
  }, [open]);
  const tn = (k) => (t.themeNames && t.themeNames[k]) || THEMES[k].name;
  const glass = { background:'rgba(22,17,13,0.82)', backdropFilter:'blur(14px) saturate(160%)', WebkitBackdropFilter:'blur(14px) saturate(160%)' };
  const swatchDot = (swatch, size) => <span style={{ width:size, height:size, borderRadius:'50%', background:`linear-gradient(135deg, ${swatch[0]} 0 50%, ${swatch[1]} 50% 100%)`, boxShadow:'inset 0 0 0 1px rgba(255,255,255,0.25)', flexShrink:0 }}></span>;
  const cur = THEMES[themeKey] || THEMES.A;
  return (
    <div ref={ref} style={{ position:'absolute', bottom:20, left:'50%', transform:'translateX(-50%)', zIndex:70 }}>
      <button onClick={() => setOpen(o => !o)} aria-haspopup="listbox" aria-expanded={open} style={{ display:'flex', alignItems:'center', gap:8, border:'none', cursor:'pointer', padding:'7px 12px', borderRadius:999, ...glass, boxShadow:'0 8px 30px rgba(0,0,0,0.32), inset 0 0 0 0.5px rgba(255,255,255,0.16)' }}>
        {swatchDot(cur.swatch, 16)}
        <span style={{ fontFamily:"'DM Sans', system-ui, sans-serif", fontSize:12.5, fontWeight:600, color:'#fff' }}>{tn(themeKey)}</span>
        <svg width="11" height="11" viewBox="0 0 14 14" style={{ transform:open?'rotate(180deg)':'none', transition:'transform .2s' }}><path d="M2 4l5 5 5-5" stroke="rgba(255,255,255,0.8)" strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      {open && (
        <div role="listbox" style={{ position:'absolute', bottom:'calc(100% + 6px)', left:'50%', transform:'translateX(-50%)', minWidth:150, padding:4, borderRadius:12, ...glass, boxShadow:'0 12px 32px rgba(0,0,0,0.4), inset 0 0 0 0.5px rgba(255,255,255,0.14)', display:'flex', flexDirection:'column', gap:2 }}>
          {Object.keys(THEMES).map(k => {
            const on = k === themeKey;
            return (
              <button key={k} role="option" aria-selected={on} onClick={() => { onPick(k); setOpen(false); }} style={{ display:'flex', alignItems:'center', gap:9, width:'100%', border:'none', cursor:'pointer', padding:'7px 10px', borderRadius:8, background:on?'rgba(255,255,255,0.16)':'transparent', transition:'background .15s' }}>
                {swatchDot(THEMES[k].swatch, 14)}
                <span style={{ fontFamily:"'DM Sans', system-ui, sans-serif", fontSize:13, fontWeight:on?700:500, color:on?'#fff':'rgba(255,255,255,0.75)' }}>{tn(k)}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function LangPicker({ lang, onPick }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onEsc = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('pointerdown', onDoc, true);
    document.addEventListener('keydown', onEsc, true);
    return () => { document.removeEventListener('pointerdown', onDoc, true); document.removeEventListener('keydown', onEsc, true); };
  }, [open]);
  const glass = { background:'rgba(22,17,13,0.82)', backdropFilter:'blur(14px) saturate(160%)', WebkitBackdropFilter:'blur(14px) saturate(160%)' };
  const cur = LANGS[lang] || LANGS.EN;
  return (
    <div ref={ref} style={{ position:'absolute', top:14, right:14, zIndex:90 }}>
      <button onClick={() => setOpen(o => !o)} aria-haspopup="listbox" aria-expanded={open} style={{ display:'flex', alignItems:'center', gap:7, padding:'6px 9px', borderRadius:999, border:'none', cursor:'pointer', ...glass, boxShadow:'0 4px 20px rgba(0,0,0,0.28), inset 0 0 0 0.5px rgba(255,255,255,0.16)' }}>
        <img src={cur.flagUrl} alt="" style={{ width:22, height:16, borderRadius:3, objectFit:'cover', display:'block' }} />
        <span style={{ fontFamily:"'DM Sans', system-ui, sans-serif", fontSize:12.5, fontWeight:600, color:'#fff', letterSpacing:'0.04em' }}>{cur.code}</span>
        <svg width="11" height="11" viewBox="0 0 14 14" style={{ transform:open?'rotate(180deg)':'none', transition:'transform .2s' }}><path d="M2 4l5 5 5-5" stroke="rgba(255,255,255,0.8)" strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      {open && (
        <div role="listbox" style={{ position:'absolute', top:'calc(100% + 6px)', right:0, minWidth:104, padding:4, borderRadius:12, ...glass, boxShadow:'0 12px 32px rgba(0,0,0,0.4), inset 0 0 0 0.5px rgba(255,255,255,0.14)', display:'flex', flexDirection:'column', gap:2 }}>
          {Object.values(LANGS).map(l => {
            const on = l.code === lang;
            return (
              <button key={l.code} role="option" aria-selected={on} onClick={() => { onPick(l.code); setOpen(false); }} style={{ display:'flex', alignItems:'center', gap:9, width:'100%', border:'none', cursor:'pointer', padding:'7px 10px', borderRadius:8, background:on?'rgba(255,255,255,0.16)':'transparent', transition:'background .15s' }}>
                <img src={l.flagUrl} alt="" style={{ width:22, height:16, borderRadius:3, objectFit:'cover', display:'block', flexShrink:0 }} />
                <span style={{ fontFamily:"'DM Sans', system-ui, sans-serif", fontSize:13, fontWeight:on?700:500, color:on?'#fff':'rgba(255,255,255,0.75)', letterSpacing:'0.04em' }}>{l.code}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FilterBar({ theme, filters, onToggle, onClear, count, shown, query, onQuery, t }) {
  const [open, setOpen] = useState(false);
  const m = theme.minimal;
  const chip = (active, label, onClick, dot) => (
    <button key={label} onClick={onClick} style={{ display:'inline-flex', alignItems:'center', gap:6, cursor:'pointer', borderRadius:999, padding:'7px 13px', fontFamily:'var(--font-body)', fontSize:13, fontWeight:500, border:active?'1.5px solid var(--primary)':'1.5px solid var(--line)', background:active?'var(--primary)':'var(--surface)', color:active?'var(--on-primary)':'var(--text)', transition:'background .15s, color .15s' }}>
      {dot && <span style={{ width:7, height:7, borderRadius:'50%', background:active?'var(--on-primary)':'#6BA368' }}></span>}{label}
    </button>
  );
  return (
    <div style={{ padding:'10px 16px', background:'var(--bg)', borderBottom:'1px solid var(--line)', flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ flex:1, position:'relative', display:'flex', alignItems:'center' }}>
          <svg width="15" height="15" viewBox="0 0 18 18" fill="none" style={{ position:'absolute', left:11, pointerEvents:'none' }}><circle cx="8" cy="8" r="6" stroke="var(--muted)" strokeWidth="1.6"/><path d="M12.5 12.5L16 16" stroke="var(--muted)" strokeWidth="1.6" strokeLinecap="round"/></svg>
          <input value={query} onChange={e => onQuery(e.target.value)} placeholder={t.search}
            style={{ width:'100%', boxSizing:'border-box', padding:'9px 34px 9px 32px', borderRadius:999, border:'1.5px solid var(--line)', background:'var(--surface)', color:'var(--text)', fontFamily:'var(--font-body)', fontSize:13, outline:'none' }} />
          {query && <button onClick={() => onQuery('')} aria-label="clear search" style={{ position:'absolute', right:8, width:20, height:20, border:'none', borderRadius:'50%', cursor:'pointer', background:'var(--pill-bg)', color:'var(--pill-ink)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, lineHeight:1, padding:0 }}>×</button>}
        </div>
        <button onClick={() => onToggle('free','GL')} aria-pressed={filters.free.includes('GL')} style={{ display:'inline-flex', alignItems:'center', gap:5, cursor:'pointer', borderRadius:999, padding:'8px 10px', fontFamily:'var(--font-body)', fontSize:12, fontWeight:600, whiteSpace:'nowrap', flexShrink:0, border:filters.free.includes('GL')?'1.5px solid var(--primary)':'1.5px solid var(--line)', background:filters.free.includes('GL')?'var(--primary)':'var(--surface)', color:filters.free.includes('GL')?'var(--on-primary)':'var(--text)', transition:'background .15s, color .15s' }}>
          <img src="images/allergens/gluten.png" alt="" style={{ width:14, height:14, objectFit:'contain', filter:filters.free.includes('GL')?'brightness(0) invert(1)':'none' }} />
          {t.coeliac}
        </button>
        <button onClick={() => setOpen(o => !o)} style={{ display:'inline-flex', alignItems:'center', gap:6, cursor:'pointer', borderRadius:999, padding:'8px 11px', border:'1.5px solid var(--accent)', background:count?'var(--accent)':'transparent', color:count?'var(--accent-ink)':'var(--text)', fontFamily:'var(--font-body)', fontSize:11.5, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', whiteSpace:'nowrap', flexShrink:0 }}>
          <svg width="13" height="13" viewBox="0 0 14 14" style={{ transform:open?'rotate(180deg)':'none', transition:'transform .2s' }}><path d="M2 4l5 5 5-5" stroke="currentColor" strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          {t.filters}{count ? ` · ${count}` : ''}
        </button>
      </div>
      {open && (
        <div style={{ marginTop:12 }}>
          <div style={{ fontFamily:'var(--font-body)', fontSize:10, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--muted)', marginBottom:8 }}>{t.dietary}</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:14 }}>
            {chip(filters.diet.includes('v'), t.vegetarian, () => onToggle('diet','v'), true)}
            {chip(filters.diet.includes('vg'), t.vegan, () => onToggle('diet','vg'), true)}
          </div>
          <div style={{ fontFamily:'var(--font-body)', fontSize:10, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--muted)', marginBottom:8 }}>{t.freeFrom}</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
            {FILTERS.freeFrom.map(code => chip(filters.free.includes(code), t.allergens[code], () => onToggle('free',code), false))}
          </div>
          <div style={{ marginTop:14, fontFamily:'var(--font-body)', fontSize:12, color:'var(--muted)' }}>{t.showing(shown)}</div>
          {count > 0 && (
            <button onClick={onClear} style={{ marginTop:10, border:'none', background:'transparent', cursor:'pointer', color:'var(--accent)', fontFamily:'var(--font-body)', fontSize:12.5, fontWeight:600, textDecoration:'underline', padding:0, display:'block' }}>{t.clearFilters}</button>
          )}
        </div>
      )}
    </div>
  );
}

function MenuApp() {
  const [themeKey, setThemeKey] = useState(() => { try { return localStorage.getItem('menu-theme') || 'B'; } catch { return 'B'; } });
  const [lang, setLang] = useState(() => { try { return localStorage.getItem('menu-lang') || 'EN'; } catch { return 'EN'; } });
  const [active, setActive] = useState('All');
  const [query, setQuery] = useState('');
  const [filters, setFilters] = useState({ diet:[], free:[] });
  const toggleFilter = (group, id) => setFilters(f => {
    const has = f[group].includes(id);
    return { ...f, [group]: has ? f[group].filter(x => x !== id) : [...f[group], id] };
  });
  const clearFilters = () => setFilters({ diet:[], free:[] });
  const filterCount = filters.diet.length + filters.free.length;
  const [dish, setDish] = useState(null);
  const theme = THEMES[themeKey];
  const t = LANGS[lang];
  _openDish = setDish;
  useEffect(() => { try { localStorage.setItem('menu-theme', themeKey); } catch {} }, [themeKey]);
  useEffect(() => { try { localStorage.setItem('menu-lang', lang); } catch {} }, [lang]);
  const cats = useMemo(() => ['All', ...CATEGORIES], []);
  const visibleCount = useMemo(() => DISHES.filter(d =>
    (active === 'All' || d.cat === active) && dishPasses(d, filters) && matchesQuery(d, query, t)
  ).length, [active, filters, query, t]);
  return (
    <div id="appcol" style={{ ...theme.vars, height:'100%', width:'100%', maxWidth:720, position:'relative', display:'flex', flexDirection:'column', background:'var(--bg)', color:'var(--text)', boxShadow:'0 0 50px rgba(60,45,30,0.12)' }}>
      <Header theme={theme} t={t} />
      <Tabs theme={theme} cats={cats} active={active} onSelect={setActive} t={t} />
      <FilterBar theme={theme} filters={filters} onToggle={toggleFilter} onClear={clearFilters} count={filterCount} shown={visibleCount} query={query} onQuery={setQuery} t={t} />
      <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch' }} className="no-scrollbar">
        <MenuList theme={theme} active={active} filters={filters} query={query} t={t} />
        <Legend theme={theme} t={t} />
        <div style={{ height:96 }}></div>
      </div>
      {dish && <DetailSheet theme={theme} dish={dish} onClose={() => setDish(null)} onOpen={setDish} t={t} />}
      <ThemeToggle themeKey={themeKey} onPick={setThemeKey} t={t} />
      <LangPicker lang={lang} onPick={setLang} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MenuApp />);
</script>

</body>
</html>
